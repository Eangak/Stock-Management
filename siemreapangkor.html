<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siem Reap Angkor Hotel | Combined File</title>
    
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #f4f4f4;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: #2c3e50;
            color: white;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #d4af37; /* Gold color */
        }

        /* Hero Section */
        .hero {
            height: 60vh;
            background: #34495e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: #d4af37;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Content Section */
        .content {
            padding: 50px 10%;
            text-align: center;
            background: white;
        }
    </style>
    </head>
<body>

    <nav class="navbar">
        <div class="logo">SIEM REAP ANGKOR</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Rooms</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Welcome to Angkor</h1>
        <p>Luxury meets tradition in the heart of Cambodia.</p>
        <a href="#" class="btn">Book Your Stay</a>
    </header>

    <section class="content">
        <h2>Your Oasis Awaits</h2>
        <p>This combined HTML and CSS file makes it easy to manage your hotel's landing page in one place.</p>
    </section>

</body>
</html>
